name: Terraform

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'plan or apply'
        required: true
        default: 'plan'
        type: choice
        options:
          - plan
          - apply
          - destroy

env:
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
  TF_VAR_aws_region: ${{ secrets.AWS_DEFAULT_REGION }}

  # Terraform variables added to the environment for use in the Terraform configuration
  TF_VAR_instance_type: "t3.small"
  TF_VAR_project_tag: "monitoring"
  TF_VAR_frontend_role_tag: "frontend"
  TF_VAR_backend_role_tag: "backend"

jobs:
  terraform:
    name: Terraform ${{ inputs.action }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.5"

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="region=${{ secrets.AWS_DEFAULT_REGION }}"

      - name: Terraform Format Check
        run: terraform fmt -check

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -input=false -no-color

      - name: Terraform Apply
        if: inputs.action == 'apply'
        run: terraform apply -input=false -auto-approve

      - name: Terraform Destroy
        if: inputs.action == 'destroy'
        run: terraform destroy -input=false -auto-approve
